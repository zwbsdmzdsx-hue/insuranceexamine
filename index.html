let currentSection = 'home';
let nightMode = localStorage.getItem('iiqe-night') === '1';
let progress = JSON.parse(localStorage.getItem('iiqe-progress') || '{}');
let searchResults = [];

// ==== RENDER ====
function render() {
  var app = document.getElementById('app');
  var nav = document.getElementById('chNav');
  var html = '';
  
  nav.innerHTML = '';
  for (var ch = 1; ch <= 7; ch++) {
    var m = CHAPTER_META[ch];
    var a = document.createElement('a');
    a.href = '#';
    a.dataset.section = 'ch' + ch;
    if (currentSection === 'ch' + ch) a.className = 'active';
    a.innerHTML = '<span class="ch-icon">' + m.icon + '</span><span class="ch-name">第' + ch + '章 ' + m.title + '</span><span class="ch-badge" style="background:' + m.color + ';color:#fff">' + m.weight + '%</span>';
    a.addEventListener('click', function(e) {
      e.preventDefault();
      currentSection = this.dataset.section;
      closeSidebar();
      render();
    });
    nav.appendChild(a);
  }
  
  // Main content
  if (currentSection === 'home') {
    html = renderHome();
  } else if (currentSection === 'tips') {
    html = renderTips();
  } else if (currentSection === 'full-quiz') {
    html = renderFullQuiz();
  } else if (currentSection.indexOf('ch') === 0) {
    var ch = parseInt(currentSection.replace('ch', ''));
    html = renderChapter(ch);
  } else if (currentSection.indexOf('search-') === 0) {
    html = renderSearchResults();
  }
  
  app.innerHTML = html;
  updateProgress();
  bindFooterLinks();
  bindQuizEvents();
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function bindFooterLinks() {
  document.querySelectorAll('.sidebar-footer a').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      if (this.dataset.section) {
        currentSection = this.dataset.section;
        closeSidebar();
        render();
      }
    });
  });
}

function renderChapter(ch) {

  var doneKey = 'ch' + ch;

  var h = '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:8px;">';
  h += '<h1 style="margin:0;">' + meta.icon + ' 第' + ch + '章 ' + data.title + '</h1>';
  h += '<span class="tag tag-star" style="background:' + meta.color + ';color:#fff;">考题占比 ' + meta.weight + '% · ' + meta.questions + '题</span></div>';
  h += '<div style="font-size:13px;color:var(--text2);margin-bottom:16px;">学习状态：' + (isDone ? '✅ 已学完' : '⏳ 学习中') + '</div>';
  
  for (var si = 0; si < data.sections.length; si++) {
    var sec = data.sections[si];
    h += '<h2><span>📖 ' + (sec.title || sec.id) + '</span></h2>';
    
    if (sec.plain_explanation) {
      h += '<div class="plain-box">' + sec.plain_explanation.replace(/\\n/g, '<br>') + '</div>';
    }
    
    if (sec.cards && sec.cards.length > 0) {
      h += '<h3>📇 知识卡片 <span style="font-size:12px;color:var(--text2);font-weight:400;">（点击翻转）</span></h3><div class="kcard-grid">';
      for (var ci = 0; ci < sec.cards.length; ci++) {
        var c = sec.cards[ci];
        if (!c.term) continue;
        h += '<div class="kcard" onclick="this.classList.toggle(\'flipped\')"><div class="kcard-inner"><div class="kcard-front"><div class="k-term">' + c.term + '</div><div class="k-hint">👆 点击查看解释</div></div><div class="kcard-back"><div class="k-def">' + (c.definition || c.plain) + '</div>' + (c.plain && c.definition ? '<div class="k-plain">💡 ' + c.plain + '</div>' : '') + '</div></div></div>';
      }
      h += '</div>';
    }
    
    if (sec.comparisons && sec.comparisons.length > 0) {
      for (var coi = 0; coi < sec.comparisons.length; coi++) {
        var comp = sec.comparisons[coi];
        if (!comp.items || comp.items.length === 0) continue;
        h += '<h3>📊 ' + (comp.title || '对比表') + '</h3><div class="comp-wrap">';
        if (comp.title) h += '<div class="comp-title">' + comp.title + '</div>';
        h += '<table class="comp-table"><tr><th style="width:24%;">对比维度</th><th class="col-a">A</th><th class="col-b">B</th></tr>';
        for (var ii = 0; ii < comp.items.length; ii++) {
          var item = comp.items[ii];
          h += '<tr><td style="font-weight:500;">' + item.name + '</td><td class="col-a">' + item.a + '</td><td class="col-b">' + item.b + '</td></tr>';
        }
        h += '</table></div>';
      }
    }
    
    if (sec.cases && sec.cases.length > 0) {
      h += '<h3>🎯 案例讲解</h3>';
      for (var cai = 0; cai < sec.cases.length; cai++) {
        var ca = sec.cases[cai];
        if (!ca.title && !ca.description) continue;
        h += '<div class="case-card">';
        if (ca.title) h += '<div class="case-title">' + ca.title + '</div>';
        if (ca.description) h += '<div class="case-scenario">' + ca.description.replace(/\\n/g, '<br>') + '</div>';
        h += '</div>';
      }
    }
    
    if (sec.quiz && sec.quiz.length > 0) {
      var filt = sec.quiz.filter(function(q) { return q.q && q.options && q.options.length >= 2; });
      if (filt.length > 0) {

  h += (isDone ? '✅ 已标记完成' : '📌 标记本章已学完');
  h += '</button></div>';
  
  return h;
}

function renderQuizItem(q, index, sectionId) {
  var uid = sectionId + '-q' + index;
  var h = '<div class="quiz-item" id="quiz-' + uid + '"><div class="quiz-q">' + q.q + '</div>';
  for (var oi = 0; oi < q.options.length; oi++) {
    h += '<label class="quiz-opt" data-quiz="' + uid + '" data-opt="' + oi + '" onclick="checkAnswer(\'' + uid + '\', ' + oi + ', ' + q.answer + ')">';
    h += '<input type="radio" name="' + uid + '" value="' + oi + '"> ' + q.options[oi] + '</label>';
  }
  h += '<div class="quiz-explain" id="explain-' + uid + '">' + (q.explanation || '') + '</div></div>';
  return h;
}

// ==== FULL QUIZ ====
function renderFullQuiz() {
  var allQuiz = [];
  for (var ch in CHAPTER_DATA) {
    var data = CHAPTER_DATA[ch];
    for (var si = 0; si < data.sections.length; si++) {
      var sec = data.sections[si];
      if (sec.quiz) {
        for (var qi = 0; qi < sec.quiz.length; qi++) {
          var q = sec.quiz[qi];
          if (q.q && q.options && q.options.length >= 2) {
            allQuiz.push({q: q.q, options: q.options, answer: q.answer, explanation: q.explanation, source: '第' + ch + '章 · ' + sec.title});
          }
        }
      }
    }
  }
  
  // Shuffle
  for (var i = allQuiz.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = allQuiz[i]; allQuiz[i] = allQuiz[j]; allQuiz[j] = tmp;
  }
  
  if (allQuiz.length === 0) return '<div class="card"><p>暂无测验题</p></div>';
  
  var h = '<h1>📝 综合模拟测试</h1><p class="ch-subtitle">共 ' + allQuiz.length + ' 道题（随机出题）· 点击选项查看答案和解析</p><div class="quiz-container" data-section="full">';
  
  for (var i = 0; i < allQuiz.length; i++) {
    var q = allQuiz[i];
    var uid = 'full-' + i;
    h += '<div class="quiz-item" id="quiz-' + uid + '">';
    h += '<span class="tag tag-info" style="margin-bottom:6px;">' + q.source + '</span>';
    h += '<div class="quiz-q">' + (i+1) + '. ' + q.q + '</div>';
    for (var oi = 0; oi < q.options.length; oi++) {
      h += '<label class="quiz-opt" data-quiz="' + uid + '" data-opt="' + oi + '" onclick="checkAnswer(\'' + uid + '\', ' + oi + ', ' + q.answer + ')">';
      h += '<input type="radio" name="' + uid + '" value="' + oi + '"> ' + q.options[oi] + '</label>';
    }
    h += '<div class="quiz-explain" id="explain-' + uid + '">' + (q.explanation || '') + '</div></div>';
  }
  
  h += '<div class="quiz-score" id="score-full"></div>';
  h += '<div style="text-align:center;"><button class="quiz-reset" onclick="resetFullQuiz()">🔄 重新出题测试</button></div></div>';
  
  return h;
}

// ==== QUIZ LOGIC ====
function checkAnswer(uid, selected, correct) {
  var options = document.querySelectorAll('[data-quiz="' + uid + '"]');
  var explain = document.getElementById('explain-' + uid);
  if (!explain) return;
  
  options.forEach(function(o) {
    o.classList.add('disabled');
    var radio = o.querySelector('input');
    if (radio) radio.disabled = true;
  });
  
  options.forEach(function(o, i) {
    if (i === correct) o.classList.add('correct');
  });
  
  if (selected !== correct) {
    options[selected].classList.add('wrong');
  }
  
  explain.classList.add('show');
  explain.classList.add(selected === correct ? 'correct' : 'wrong');
  
  // Update score for the container
  var container = explain.closest('[data-section]') || explain.closest('.quiz-container');
  if (container) {
    var sectionId = container.dataset.section;
    if (sectionId) updateScore(sectionId);
  }
}

function updateScore(sectionId) {
  var container = document.querySelector('[data-section="' + sectionId + '"]') || document.getElementById('fullQuizContainer');
  if (!container) return;
  
  var items = container.querySelectorAll('.quiz-item');
  var total = 0, correct = 0;
  items.forEach(function(item) {
    var explains = item.querySelector('.quiz-explain');
    if (explains && explains.classList.contains('show')) {
      total++;
      if (explains.classList.contains('correct')) correct++;
    }
  });
  
  var scoreEl = document.getElementById('score-' + sectionId);
  if (scoreEl && total > 0) {
    scoreEl.textContent = '✅ ' + correct + '/' + total + ' 正确 · ' + Math.round(correct/total*100) + '%';
  }
}

function resetQuiz(sectionId) {
  var container = document.querySelector('[data-section="' + sectionId + '"]');
  if (!container) return;
  container.querySelectorAll('.quiz-opt').forEach(function(o) {
    o.classList.remove('correct', 'wrong', 'disabled');
    var radio = o.querySelector('input');
    if (radio) radio.disabled = false;
  });
  container.querySelectorAll('.quiz-explain').forEach(function(e) {
    e.classList.remove('show', 'correct', 'wrong');
  });
  var scoreEl = document.getElementById('score-' + sectionId);
  if (scoreEl) scoreEl.textContent = '';
}

function resetFullQuiz() {
  currentSection = 'full-quiz';
  render();
}

  progress[key] = !progress[key];
  localStorage.setItem('iiqe-progress', JSON.stringify(progress));
  render();
}

function updateProgress() {
  var total = 7;
  var done = 0;
  for (var k in progress) if (progress[k]) done++;
  var pct = Math.round(done / total * 100);
  var bar = document.getElementById('progressBarFill');
  var text = document.getElementById('progressText');
  if (bar) bar.style.width = pct + '%';
  if (text) text.textContent = '学习进度 ' + pct + '% (' + done + '/7章)';
}

function resetAll() {
  if (!confirm('确定要重置所有学习进度吗？')) return;
  progress = {};
  localStorage.removeItem('iiqe-progress');

// ==== INIT ====
document.addEventListener('DOMContentLoaded', function() {
  if (nightMode) {
    document.body.classList.add('dark');
    document.getElementById('nightToggle').textContent = '☀️ 日间模式';
  }
  
  document.getElementById('nightToggle').addEventListener('click', toggleNight);
  
  document.getElementById('hamburger').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  });
  document.getElementById('overlay').addEventListener('click', closeSidebar);
  
  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    if (!q) return;
    searchResults = [];
    for (var ch in CHAPTER_DATA) {
      var data = CHAPTER_DATA[ch];
      for (var si = 0; si < data.sections.length; si++) {
        var sec = data.sections[si];
        var searchable = ((sec.plain_explanation||'') + ' ' + (sec.title||'') + ' ' + (sec.id||'')).toLowerCase();
        if (searchable.indexOf(q) >= 0) {
          searchResults.push({ch: parseInt(ch), sec: sec});
        }
        if (sec.cards) {
          for (var ci = 0; ci < sec.cards.length; ci++) {
            var c = sec.cards[ci];
            if (((c.term||'') + ' ' + (c.definition||'') + ' ' + (c.plain||'')).toLowerCase().indexOf(q) >= 0) {
              searchResults.push({ch: parseInt(ch), sec: sec, match: c.term});
            }
          }
        }
      }
    }
    searchResults = searchResults.slice(0, 20);
    if (searchResults.length > 0) {
      currentSection = 'search-' + q;
      render();
    }
  });
  
  // Hash
  var hash = location.hash.replace('#', '');
  if (hash && (hash.indexOf('ch') === 0 || hash === 'tips' || hash === 'full-quiz')) {
    currentSection = hash;
  }
  
  render();
});

window.addEventListener('hashchange', function() {
  var hash = location.hash.replace('#', '');
  if (hash && (hash.indexOf('ch') === 0 || hash === 'tips' || hash === 'full-quiz')) {
    currentSection = hash;
    render();
  }
});
</script>
