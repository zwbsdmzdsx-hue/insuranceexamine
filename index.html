        plain_explanation: '合约(Contract)就是两个人或多方之间达成的一个约定，这个约定受法律保护，如果有人不遵守，另一方可以找法院帮忙。\n\n合约本质上就是一个\'有法律保障的约定\'。\n\n实例：比如你今天去菜市场跟老板说\'我要买两斤苹果，明天来拿\'，老板答应了。这其实就是一个小小的口头合约。如果老板到时候不给你苹果，或者你到时候不付钱，对方就可以依据法律来追责。\n\n合约分两种主要类型：一种是\'简单合约\'，就是日常生活中最常用的那种，不太讲究形式要求；另一种是\'契据\'，就像古代盖玉玺一样，需要正式地签字、盖章、交付文件，要求非常严格。\n\n一个合约要有效，必须满足六个条件(就像组装一台电脑需要六个零件)。如果缺了任何一个，合约就可能\'有缺陷\'，就像电脑少了个零件就不能正常工作一样。',

        title: '代理法',
        plain_explanation: '代理就是\'我请别人帮我办事，别人办的事就相当于我自己办的\'。比如你出差没空，让朋友代你去签租房合同，朋友签的字就相当于你签的字。\n\n代理(Agency)就是委托人(Principal)请代理人(Agent)代表自己去跟第三方做事情。代理人做的行为，法律上视为委托人本人做的。\n\n实例：你请房产中介帮你卖房子。中介帮你谈价格、签合同，在法律上就相当于你本人谈的价格、签的合同。买房的人如果要告，也是告你(委托人)，而不是告中介(代理人)。\n\n代理关系不是随便说说的，主要有两种建立方式：一种是\'事先说好\'，一种是\'事后追认\'。\n\n代理人到底有多大的\'权力\'？这可不是随便定的，法律上分了好几层权限，有的显而易见，有的藏在背后，有的则是紧急情况下被迫产生的。\n\n代理人拿了委托人的钱(或受托办的事)，就必须老老实实、认认真真地办事，不能偷懒、不能欺骗、更不能卷款跑路。\n\n委托人请人办事，不能只要求代理人做好，委托人也得承担自己的责任——给钱、报销、承担违约后果。这是双向的。\n\n代理关系不是永久的，总会有结束的时候。结束的原因可以是双方说好的、一方违约的，或者一些不可抗力的情况(比如人去世了)。',

        ],
        quiz: [
          {q: '在本港人寿保险中，投保人对以下哪三类人仕是具有可保权益的？\ni. 配偶\nii. 欠债人\niii. 债权人\niv. 年满15岁的子女', options: ['A. i, ii, iii','B. i, ii, iv','C. i, iii, iv','D. ii, iii, iv'], answer: 1, explanation: '配偶（i正确）和未满18岁的子女（iv正确）都享有可保权益。债权人对债务人（欠债人）的生命有可保权益，所以ii也正确。但iii债权人是指欠债人对自己，不是投保人对债权人，容易混淆。注意题目问的是\'欠债人\'和\'债权人\'在语境中的角色。'},
          {q: '以下哪项保险在损失存在时才需要可保权益？\ni. 人寿保险\nii. 汽车保险\niii. 海上货物保险\niv. 人身意外保险', options: ['A. i, ii','B. i, iv','C. ii, iii','D. ii, iv'], answer: 2, explanation: '人寿保险只需在保单生效时具有可保权益，损失（死亡）时不需要再验证。人身意外保险也属于人身保险类别，同样只需投保时。汽车保险和海上货物保险属于弥偿保险，需要在损失发生时具有可保权益。所以ii和iii正确，答案C。'},
          {q: '当保单有效地从转让人身上转让到承让人身上的时候，转让人在合约的权益也完全转移到承让人身上，这是属于哪一类转让？', options: ['A. 保险合约的转让','B. 收取保险金的权利的转让','C. 可保权益的转让','D. 保单收益的转让'], answer: 0, explanation: '题目描述的是整个保险合约从转让人转移到承让人，相关权益完全转移——这是\'保险合约的转让\'。B和D描述的是同一种情况（收取保险金的权利转让/保单收益转让），即保单仍保原被保险人，只是赔款给承让人。C不存在这样的类别。'},
          {q: '涉及蓄意保留重要事实，可被视为违反最高诚信的：', options: ['A. 欺诈性不披露','B. 非欺诈性不披露','C. 无意的失实陈述','D. 欺诈性失实陈述'], answer: 0, explanation: '\'蓄意\'=欺诈性；\'保留重要事实\'=不披露。两者结合就是\'欺诈性不披露\'。非欺诈性不披露是无意或疏忽忘了说；欺诈性失实陈述是故意说假话。'},
          {q: '有一项索偿个案，是关于由一宗（受火险保单所保障的）意外火灾所导致的损失。火灾发生的过程中，消防员为了获取进入建筑物的通道，以及用水扑救大火，引致进一步的损害。按照近因规则，因消防员所作努力而导致的损害：', options: ['A. 只得到50%的保障，因为真正的成因是该宗火灾','B. 并非一项受保危险导致，所以得不到保障','C. 是一项由受保危险导致的不保危险，因此得到保障','D. 只能于火险保单已经伸延至保障这项风险时，才会得到保障'], answer: 2, explanation: '消防员灭火造成的次生损害属于\'不保危险\'（既不是受保也不是除外），但它是受保危险（火灾）导致的，所以保险公司要赔。这是近因原则的经典案例。'},
          {q: '如果一名持有多于一份人寿保险单的人士辞世，分担是不适用于这些保单之间的，原因是：', options: ['A. 它们并不保障相同的权益','B. 它们不受弥偿的约束','C. 索偿的近因相同','D. 这些保单可能由同一名保险人签发'], answer: 1, explanation: '分担是弥偿原则的延伸。只有适用弥偿原则的保险才适用分担。寿险不适用弥偿（因为生命无法用金钱精确衡量），所以也不适用分担。买了多份寿险，每份都全额赔付。'},
          {q: '根据非海上保险中的\'比例分摊\'条款：', options: ['A. 是产生赔案时，对保额不足的情况施行惩罚的保单条文','B. 是产生赔案时，就算发现有保额不足的情况，亦会按全额赔偿','C. 是产生赔案时，不同保险人都会就相同的投保物作出全额赔偿','D. 是产生赔案时，不同保险人都会就相同的投保物只作出投保额所占比例赔偿'], answer: 0, explanation: '比例分摊是针对\'不足额投保\'的条款。财产实际价值400万，只保了100万（25%），那么发生损失时保险公司也只赔损失的25%。这是一种对不足额投保的\'惩罚\'。注意比例分摊（不足额投保）和分担（重复保险）的区别。'},
          {q: '免赔额与起赔额的分别在于超过（或不低于）X损失的金额时：', options: ['A. 超过X的免赔额，保险人支付十足的保障','B. 超过X的起赔额，保险人支付十足的保障','C. 超过X的免赔额，保险人收取额外X保费的要求','D. 超过X的起赔额，保险人收取额外X保费的要求'], answer: 1, explanation: '起赔额：超过这个金额后，保险公司全额赔付（不算多出来的部分）。免赔额：每次损失投保人先自己掏X金额，超出的部分保险公司赔。所以超过X的起赔额，保险公司赔偿全部损失。超过X的免赔额，保险公司只赔（损失-X）。因此B正确。'},
          {q: '以下哪三项保单条文，可以理解为在索偿中，实际赔付的金额超越弥偿金额？\ni. \'以新代旧\'的保障\nii. 约定价值保单\niii. 重置保险\niv. 比例分摊的条件', options: ['A. i, ii, iii','B. i, ii, iv','C. i, iii, iv','D. ii, iii, iv'], answer: 0, explanation: '超越弥偿的条款包括：(i)以新代旧保障、(ii)约定价值保单、(iii)重置保险。比例分摊(iv)是限制弥偿的条款，不是超越弥偿。超越弥偿的第四项应该是水险保单（定值方式承保）。所以A正确。'},
          {q: '当发生一项$1,000,000的财产损失，当中出现重复保险。因此，一名提供财产全险保障的保险人委任的理赔师建议提供$400,000的赔偿，有关保额为$10,000,000。这显示以下哪项所述是正确的？', options: ['A. 所有其他有关保单都有分担条款','B. 这份保单有分担条款','C. 这份保单有比例分摊条款','D. 所有有关保单均有比率之数条款'], answer: 1, explanation: '题目描述的是重复保险情况，保额1000万但只赔40万，说明这家保险公司只承担了部分损失——这是分担条款（比率之数条款）的体现。答案A和D提到\'所有\'保单，但题目只介绍了这一张保单，信息不足以判断其他保单的情况。比例分摊是不足额投保的概念，与重复保险不同。所以最准确的答案是B。'},
          {q: '第三者一方出现疏忽后，在以下哪种情况下不会产生代位？', options: ['A. 被保人的辞世（人寿保单）','B. 受保建筑物受到损害（火险）','C. 受保汽车遭受严重损毁（汽车保单）','D. 以上所有各项'], answer: 0, explanation: '代位只适用于弥偿保险。人寿保险不是弥偿保单，所以即使第三者疏忽导致被保人死亡，寿险公司赔付后也不能向第三者代位追偿。火险和车险都是弥偿保险，适用代位。所以A正确。'},
          {q: '小王给自己的房子买了火险，保额100万。一天邻居家失火蔓延到小王家，消防队来救火时把小王家的窗户砸破进入，并用水把屋内家具淋湿。火灾本身只烧毁了厨房，但消防队造成的砸窗和水损价值5万元。以下哪项说法正确？', options: ['A. 砸窗和水损是由消防队造成的，不属于火灾，保险公司不赔','B. 砸窗和水损是火灾引发的次生损失，属于受保危险导致的损害，保险公司要赔','C. 砸窗和水损只能赔一半，因为不完全是火灾造成的','D. 只有火灾直接烧毁的部分才赔，其他一概不赔'], answer: 1, explanation: '根据近因原则，火灾是这起损失的有效和主导成因。消防员救火造成的水损和砸窗属于\'由受保危险引发的不保危险\'，保险公司需要赔偿。这是近因原则的经典案例，考试几乎必考。'},
          {q: '老张在A公司买了100万人寿保险，在B公司也买了50万人寿保险。老张因意外去世，家属向两家公司索赔。以下哪项说法正确？', options: ['A. A公司和B公司按比例分摊，A赔66.7万，B赔33.3万','B. A公司赔100万，B公司不用赔','C. A公司赔100万，B公司赔50万，合计150万','D. 只能从一家公司索赔，不能同时向两家要'], answer: 2, explanation: '人寿保险不适用弥偿原则，因此也不适用分担原则。买多份寿险，每份都全额赔付。所以A公司按约定赔100万，B公司赔50万，家属总共拿到150万。'},
          {q: '小李的汽车实际价值30万，但他只投保了15万的车损险。一次事故中车辆全损，实际损失30万。按照比例分摊条款，保险公司应赔付：', options: ['A. 30万（全额赔付）','B. 15万（按保额赔付）','C. 7.5万（按投保比例50%赔付）','D. 一分不赔'], answer: 1, explanation: '等一下，这里需要小心。比例分摊的公式是：（保额/实际价值）× 实际损失。但题目中的\'15万\'是保额，按比例分摊条款：150,000/300,000×300,000=150,000。实际上是按保额赔付，因为损失金额超过了保额。如果损失是10万，那赔（15/30×10）=5万。这道题的关键是：当损失金额≥保额时，赔保额；当损失金额<保额时，按比例赔。'},

// ==== RENDER ====
function render() {
  var app = document.getElementById('app');
  var nav = document.getElementById('chNav');
  var html = '';
  
  nav.innerHTML = '';
  for (var ch = 1; ch <= 7; ch++) {
    var m = CHAPTER_META[ch];
    var a = document.createElement('a');
    a.href = '#';
    a.dataset.section = 'ch' + ch;
    if (currentSection === 'ch' + ch) a.className = 'active';
    a.innerHTML = '<span class="ch-icon">' + m.icon + '</span><span class="ch-name">\u7b2c' + ch + '\u7ae0 ' + m.title + '</span><span class="ch-badge" style="background:' + m.color + ';color:#fff">' + m.weight + '%</span>';
    a.addEventListener('click', function(e) {
      e.preventDefault();
      currentSection = this.dataset.section;
      closeSidebar();
      render();
    });
    nav.appendChild(a);
  }
  
  // Main content
  if (currentSection === 'home') {
    html = renderHome();
  } else if (currentSection === 'tips') {
    html = renderTips();
  } else if (currentSection === 'full-quiz') {
    html = renderFullQuiz();
  } else if (currentSection.indexOf('ch') === 0) {
    var ch = parseInt(currentSection.replace('ch', ''));
    html = renderChapter(ch);
  } else if (currentSection.indexOf('search-') === 0) {
    html = renderSearchResults();
  }
  
  app.innerHTML = html;
  updateProgress();
  bindFooterLinks();
  bindQuizEvents();
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function bindFooterLinks() {
  document.querySelectorAll('.sidebar-footer a').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      if (this.dataset.section) {
        currentSection = this.dataset.section;
        closeSidebar();
        render();
      }
    });
  });
}

// ==== CHAPTER ====
function renderChapter(ch) {
  var data = CHAPTER_DATA[ch];
  var meta = CHAPTER_META[ch];
  if (!data) return '<div class="card"><p>\u7ae0\u8282\u6570\u636e\u52a0\u8f7d\u4e2d...</p></div>';
  
  var doneKey = 'ch' + ch;
  var isDone = progress[doneKey];
  var h = '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:8px;">';
  h += '<h1 style="margin:0;">' + meta.icon + ' \u7b2c' + ch + '\u7ae0 ' + data.title + '</h1>';
  h += '<span class="tag tag-star" style="background:' + meta.color + ';color:#fff;">\u8003\u9898\u5360\u6bd4 ' + meta.weight + '% \u00b7 ' + meta.questions + '\u9898</span></div>';
  h += '<div style="font-size:13px;color:var(--text2);margin-bottom:16px;">\u5b66\u4e60\u72b6\u6001\uff1a' + (isDone ? '\u2705 \u5df2\u5b66\u5b8c' : '\u23f3 \u5b66\u4e60\u4e2d') + '</div>';
  
  for (var si = 0; si < data.sections.length; si++) {
    var sec = data.sections[si];
    h += '<h2><span>📖 ' + (sec.title || sec.id) + '</span></h2>';
    
    if (sec.plain_explanation) {
      h += '<div class="plain-box">' + sec.plain_explanation.replace(/\\n/g, '<br>') + '</div>';
    }
    
    if (sec.cards && sec.cards.length > 0) {
      h += '<h3>📇 \u77e5\u8bc6\u5361\u7247 <span style="font-size:12px;color:var(--text2);font-weight:400;">\uff08\u70b9\u51fb\u7ffb\u8f6c\uff09</span></h3><div class="kcard-grid">';
      for (var ci = 0; ci < sec.cards.length; ci++) {
        var c = sec.cards[ci];
        if (!c.term) continue;
        h += '<div class="kcard" onclick="this.classList.toggle(\'flipped\')"><div class="kcard-inner"><div class="kcard-front"><div class="k-term">' + c.term + '</div><div class="k-hint">👆 \u70b9\u51fb\u67e5\u770b\u89e3\u91ca</div></div><div class="kcard-back"><div class="k-def">' + (c.definition || c.plain) + '</div>' + (c.plain && c.definition ? '<div class="k-plain">💡 ' + c.plain + '</div>' : '') + '</div></div></div>';
      }
      h += '</div>';
    }
    
    if (sec.comparisons && sec.comparisons.length > 0) {
      for (var coi = 0; coi < sec.comparisons.length; coi++) {
        var comp = sec.comparisons[coi];
        if (!comp.items || comp.items.length === 0) continue;
        h += '<h3>📊 ' + (comp.title || '\u5bf9\u6bd4\u8868') + '</h3><div class="comp-wrap">';
        if (comp.title) h += '<div class="comp-title">' + comp.title + '</div>';
        h += '<table class="comp-table"><tr><th style="width:24%;">\u5bf9\u6bd4\u7ef4\u5ea6</th><th class="col-a">A</th><th class="col-b">B</th></tr>';
        for (var ii = 0; ii < comp.items.length; ii++) {
          var item = comp.items[ii];
          h += '<tr><td style="font-weight:500;">' + item.name + '</td><td class="col-a">' + item.a + '</td><td class="col-b">' + item.b + '</td></tr>';
        }
        h += '</table></div>';
      }
    }
    
    if (sec.cases && sec.cases.length > 0) {
      h += '<h3>🎯 \u6848\u4f8b\u8bb2\u89e3</h3>';
      for (var cai = 0; cai < sec.cases.length; cai++) {
        var ca = sec.cases[cai];
        if (!ca.title && !ca.scenario) continue;
        h += '<div class="case-card">';
        if (ca.title) h += '<div class="case-title">' + ca.title + '</div>';
        if (ca.scenario) h += '<div class="case-scenario">' + ca.scenario.replace(/\\n/g, '<br>') + '</div>';
        if (ca.analysis) h += '<div class="case-analysis">' + ca.analysis.replace(/\\n/g, '<br>') + '</div>';
        h += '</div>';
      }
    }
    
    if (sec.quiz && sec.quiz.length > 0) {
      var filt = sec.quiz.filter(function(q) { return q.q && q.options && q.options.length >= 2; });
      if (filt.length > 0) {
        h += '<h3>📝 \u672c\u8282\u6d4b\u9a8c</h3><div class="quiz-container" data-section="' + sec.id + '">';
        for (var qi = 0; qi < filt.length; qi++) {
          h += renderQuizItem(filt[qi], qi, sec.id);
        }
        h += '<div class="quiz-score" id="score-' + sec.id + '"></div>';
        h += '<button class="quiz-reset" onclick="resetQuiz(\'' + sec.id + '\')">🔄 \u91cd\u505a\u672c\u8282\u6d4b\u9a8c</button></div>';
      }
    }
  }
  
  h += '<div style="text-align:center;margin:24px 0;">';
  h += '<button class="quiz-reset" style="padding:10px 28px;font-size:14px;" onclick="markChapterDone(' + ch + ')">';
  h += (isDone ? '\u2705 \u5df2\u6807\u8bb0\u5b8c\u6210' : '📌 \u6807\u8bb0\u672c\u7ae0\u5df2\u5b66\u5b8c');
  h += '</button></div>';
  
  return h;
}

function renderQuizItem(q, index, sectionId) {
  var uid = sectionId + '-q' + index;
  var h = '<div class="quiz-item" id="quiz-' + uid + '"><div class="quiz-q">' + q.q + '</div>';
  for (var oi = 0; oi < q.options.length; oi++) {
    h += '<label class="quiz-opt" data-quiz="' + uid + '" data-opt="' + oi + '" onclick="checkAnswer(\'' + uid + '\', ' + oi + ', ' + q.answer + ')">';
    h += '<input type="radio" name="' + uid + '" value="' + oi + '"> ' + q.options[oi] + '</label>';
  }
  h += '<div class="quiz-explain" id="explain-' + uid + '">' + (q.explanation || '') + '</div></div>';
  return h;
}

// ==== FULL QUIZ ====
function renderFullQuiz() {
  var allQuiz = [];
  for (var ch in CHAPTER_DATA) {
    var data = CHAPTER_DATA[ch];
    for (var si = 0; si < data.sections.length; si++) {
      var sec = data.sections[si];
      if (sec.quiz) {
        for (var qi = 0; qi < sec.quiz.length; qi++) {
          var q = sec.quiz[qi];
          if (q.q && q.options && q.options.length >= 2) {
            allQuiz.push({q: q.q, options: q.options, answer: q.answer, explanation: q.explanation, source: '\u7b2c' + ch + '\u7ae0 \u00b7 ' + sec.title});
          }
        }
      }
    }
  }
  
  // Shuffle
  for (var i = allQuiz.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = allQuiz[i]; allQuiz[i] = allQuiz[j]; allQuiz[j] = tmp;
  }
  
  if (allQuiz.length === 0) return '<div class="card"><p>\u6682\u65e0\u6d4b\u9a8c\u9898</p></div>';
  
  var h = '<h1>📝 \u7efc\u5408\u6a21\u62df\u6d4b\u8bd5</h1><p class="ch-subtitle">\u5171 ' + allQuiz.length + ' \u9053\u9898\uff08\u968f\u673a\u51fa\u9898\uff09\u00b7 \u70b9\u51fb\u9009\u9879\u67e5\u770b\u7b54\u6848\u548c\u89e3\u6790</p><div class="quiz-container" data-section="full">';
  
  for (var i = 0; i < allQuiz.length; i++) {
    var q = allQuiz[i];
    var uid = 'full-' + i;
    h += '<div class="quiz-item" id="quiz-' + uid + '">';
    h += '<span class="tag tag-info" style="margin-bottom:6px;">' + q.source + '</span>';
    h += '<div class="quiz-q">' + (i+1) + '. ' + q.q + '</div>';
    for (var oi = 0; oi < q.options.length; oi++) {
      h += '<label class="quiz-opt" data-quiz="' + uid + '" data-opt="' + oi + '" onclick="checkAnswer(\'' + uid + '\', ' + oi + ', ' + q.answer + ')">';
      h += '<input type="radio" name="' + uid + '" value="' + oi + '"> ' + q.options[oi] + '</label>';
    }
    h += '<div class="quiz-explain" id="explain-' + uid + '">' + (q.explanation || '') + '</div></div>';
  }
  
  h += '<div class="quiz-score" id="score-full"></div>';
  h += '<div style="text-align:center;"><button class="quiz-reset" onclick="resetFullQuiz()">🔄 \u91cd\u65b0\u51fa\u9898\u6d4b\u8bd5</button></div></div>';
  
  return h;
}

// ==== QUIZ LOGIC ====
function checkAnswer(uid, selected, correct) {
  var options = document.querySelectorAll('[data-quiz="' + uid + '"]');
  var explain = document.getElementById('explain-' + uid);
  if (!explain) return;
  
  options.forEach(function(o) {
    o.classList.add('disabled');
    var radio = o.querySelector('input');
    if (radio) radio.disabled = true;
  });
  
  options.forEach(function(o, i) {
    if (i === correct) o.classList.add('correct');
  });
  
  if (selected !== correct) {
    options[selected].classList.add('wrong');
  }
  
  explain.classList.add('show');
  explain.classList.add(selected === correct ? 'correct' : 'wrong');
  
  // Update score for the container
  var container = explain.closest('[data-section]') || explain.closest('.quiz-container');
  if (container) {
    var sectionId = container.dataset.section;
    if (sectionId) updateScore(sectionId);
  }
}

function updateScore(sectionId) {
  var container = document.querySelector('[data-section="' + sectionId + '"]') || document.getElementById('fullQuizContainer');
  if (!container) return;
  
  var items = container.querySelectorAll('.quiz-item');
  var total = 0, correct = 0;
  items.forEach(function(item) {
    var explains = item.querySelector('.quiz-explain');
    if (explains && explains.classList.contains('show')) {
      total++;
      if (explains.classList.contains('correct')) correct++;
    }
  });
  
  var scoreEl = document.getElementById('score-' + sectionId);
  if (scoreEl && total > 0) {
    scoreEl.textContent = '\u2705 ' + correct + '/' + total + ' \u6b63\u786e \u00b7 ' + Math.round(correct/total*100) + '%';
  }
}

function resetQuiz(sectionId) {
  var container = document.querySelector('[data-section="' + sectionId + '"]');
  if (!container) return;
  container.querySelectorAll('.quiz-opt').forEach(function(o) {
    o.classList.remove('correct', 'wrong', 'disabled');
    var radio = o.querySelector('input');
    if (radio) radio.disabled = false;
  });
  container.querySelectorAll('.quiz-explain').forEach(function(e) {
    e.classList.remove('show', 'correct', 'wrong');
  });
  var scoreEl = document.getElementById('score-' + sectionId);
  if (scoreEl) scoreEl.textContent = '';
}

function resetFullQuiz() {
  currentSection = 'full-quiz';
  render();
}

// ==== PROGRESS ====
function markChapterDone(ch) {
  var key = 'ch' + ch;
  progress[key] = !progress[key];
  localStorage.setItem('iiqe-progress', JSON.stringify(progress));
  render();
}

function updateProgress() {
  var total = 7;
  var done = 0;
  for (var k in progress) if (progress[k]) done++;
  var pct = Math.round(done / total * 100);
  var bar = document.getElementById('progressBarFill');
  var text = document.getElementById('progressText');
  if (bar) bar.style.width = pct + '%';
  if (text) text.textContent = '\u5b66\u4e60\u8fdb\u5ea6 ' + pct + '% (' + done + '/7\u7ae0)';
}

function resetAll() {
  if (!confirm('\u786e\u5b9a\u8981\u91cd\u7f6e\u6240\u6709\u5b66\u4e60\u8fdb\u5ea6\u5417\uff1f')) return;
  progress = {};
  localStorage.removeItem('iiqe-progress');
  render();
}

function goToChapter(ch) {
  currentSection = 'ch' + ch;
  location.hash = 'ch' + ch;
  render();
}

function goTo(section) {
  currentSection = section;
  location.hash = section;
  render();
}

  // Already handled by inline onclick
}

// ==== NIGHT MODE ====
function toggleNight() {
  nightMode = !nightMode;
  document.body.classList.toggle('dark', nightMode);
  localStorage.setItem('iiqe-night', nightMode ? '1' : '0');
  document.getElementById('nightToggle').textContent = nightMode ? '\u2600\ufe0f \u65e5\u95f4\u6a21\u5f0f' : '🌙 \u591c\u95f4\u6a21\u5f0f';
}

// ==== INIT ====
document.addEventListener('DOMContentLoaded', function() {
  if (nightMode) {
    document.body.classList.add('dark');
    document.getElementById('nightToggle').textContent = '\u2600\ufe0f \u65e5\u95f4\u6a21\u5f0f';
  }
  
  document.getElementById('nightToggle').addEventListener('click', toggleNight);
  
  document.getElementById('hamburger').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  });
  document.getElementById('overlay').addEventListener('click', closeSidebar);
  
  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    if (!q) return;
    searchResults = [];
    for (var ch in CHAPTER_DATA) {
      var data = CHAPTER_DATA[ch];
      for (var si = 0; si < data.sections.length; si++) {
        var sec = data.sections[si];
        var searchable = ((sec.plain_explanation||'') + ' ' + (sec.title||'') + ' ' + (sec.id||'')).toLowerCase();
        if (searchable.indexOf(q) >= 0) {
          searchResults.push({ch: parseInt(ch), sec: sec});
        }
        if (sec.cards) {
          for (var ci = 0; ci < sec.cards.length; ci++) {
            var c = sec.cards[ci];
            if (((c.term||'') + ' ' + (c.definition||'') + ' ' + (c.plain||'')).toLowerCase().indexOf(q) >= 0) {
              searchResults.push({ch: parseInt(ch), sec: sec, match: c.term});
            }
          }
        }
      }
    }
    searchResults = searchResults.slice(0, 20);
    if (searchResults.length > 0) {
      currentSection = 'search-' + q;
      render();
    }
  });
  
  // Hash
  var hash = location.hash.replace('#', '');
  if (hash && (hash.indexOf('ch') === 0 || hash === 'tips' || hash === 'full-quiz')) {
    currentSection = hash;
  }
  
  render();
});

window.addEventListener('hashchange', function() {
  var hash = location.hash.replace('#', '');
  if (hash && (hash.indexOf('ch') === 0 || hash === 'tips' || hash === 'full-quiz')) {
    currentSection = hash;
    render();
  }
});
</script>
